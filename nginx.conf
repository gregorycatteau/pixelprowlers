user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 1M;

    limit_req_zone $binary_remote_addr zone=contact_form:10m rate=5r/m;
    limit_req_status 429;

    map $http_x_forwarded_proto $forwarded_proto {
        default $scheme;
        https https;
        http http;
    }

    # Si Hostinger, Cloudflare ou un autre proxy termine HTTPS devant Nginx,
    # configurer set_real_ip_from avec les plages IP réelles du proxy.
    # Ne pas inventer ces IPs : le rate limit doit viser la vraie IP client.

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/javascript application/json application/xml;

    upstream django {
        server django:8000;
    }

    upstream nuxt {
        server nuxt:3000;
    }

    server {
        listen 80 default_server;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        error_page 429 = @rate_limited_json;
        error_page 413 = @payload_too_large_json;

        location @rate_limited_json {
            default_type application/json;
            return 429 '{"detail":"Trop de demandes rapprochées. Réessayez plus tard."}';
        }

        location @payload_too_large_json {
            default_type application/json;
            return 413 '{"detail":"La demande envoyée est trop volumineuse."}';
        }

        location = /api/contacts/ {
            limit_req zone=contact_form burst=3 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /static/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://nuxt;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
