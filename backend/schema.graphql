type Query {
  citationAleatoire(excludeId: Int): CitationType
  motifs: [MotifType]
  raisonsAppel: [RaisonAppelType]
  refonteAudit(reference: String!): RefonteAuditType
  auditDossier(numeroDossier: String!): AuditDossierType
  creneauxDisponibles(motifId: Int!, dateDebut: Date!, dateFin: Date!, urgence: Boolean = false): [CreneauDisponibleType]
  calendrierMois(annee: Int!, mois: Int!): [JourCalendrierType]
}

