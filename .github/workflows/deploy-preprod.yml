name: Deploy Preprod

# Combinaison utilisateur/chemin/clé confirmée par connexion SSH directe et
# documentée ici pour éviter toute nouvelle dérive (2026-07-14) :
#   - Utilisateur VPS : striker (membre du groupe docker, PAS root — root
#     rejette la clé de déploiement). ~/.ssh/authorized_keys de root sur ce
#     VPS n'accepte pas cette clé, ne pas revenir à VPS_USER=root sans
#     vérifier authorized_keys côté serveur au préalable.
#   - Répertoire distant : /opt/pixelprowlers (appartient à striker,
#     inscriptible). /root/pixelprowlers n'est pas accessible à striker.
#   - Secret VPS_SSH_KEY : doit correspondre à la clé publique déjà présente
#     dans ~/striker/.ssh/authorized_keys sur le VPS pour l'utilisateur
#     striker. En local, cette clé privée est ~/.ssh/pixelprowlers_github_actions
#     (plusieurs autres clés pixelprowlers* existent en local mais ne sont
#     pas autorisées par le serveur — ne pas les réutiliser sans re-tester).
#   - Le reverse proxy en prod est Caddy (hors de ce dépôt, géré séparément
#     sur le VPS) : ne pas ajouter de service nginx/caddy dans compose.yml
#     sans revalidation explicite (voir historique de ce fichier).

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pixelprowlers-deploy
  cancel-in-progress: false

env:
  VPS_HOST: 46.202.131.25
  VPS_USER: striker
  VPS_PORT: 2222
  REMOTE_DIR: /opt/pixelprowlers
  SSH_KEY_PATH: /tmp/pixelprowlers_vps_key

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > "${SSH_KEY_PATH}"
          chmod 600 "${SSH_KEY_PATH}"
          test -s "${SSH_KEY_PATH}" && echo "✓ SSH key prepared"

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "echo '✓ SSH connection successful'"

      - name: Diagnose existing reverse proxy on host (informational, non-blocking)
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "echo '=== Listeners on 80/443 (host) ===' && \
             (ss -ltnp 2>/dev/null | grep -E ':(80|443)\b' || echo 'aucun listener host detecte sur 80/443') && \
             echo '=== Conteneurs Docker actifs (tous projets) ===' && \
             docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}' || true"

      - name: Pull latest code
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${REMOTE_DIR}' && git fetch origin master && git checkout master && git pull origin master && echo '✓ Code pulled'"

      - name: Verify .env file
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "test -f '${REMOTE_DIR}/.env' && echo '✓ .env exists' || (echo '✗ .env missing' && exit 1)"

      - name: Build and start Docker containers
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${REMOTE_DIR}' && \
             echo '=== Building Docker images ===' && \
             docker compose build && \
             echo '=== Starting containers ===' && \
             docker compose up -d && \
             echo '=== Waiting for PostgreSQL ===' && \
             for i in {1..30}; do docker compose exec -T postgres pg_isready -U pixelprowlers >/dev/null 2>&1 && echo '✓ PostgreSQL ready' && break; sleep 2; done && \
             echo '=== Waiting for Django ===' && \
             for i in {1..30}; do docker compose exec -T django curl -sf http://localhost:8000/health/ >/dev/null 2>&1 && echo '✓ Django ready' && break; sleep 2; done && \
             docker compose ps"

      - name: Run Django migrations
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${REMOTE_DIR}' && \
             echo '=== Django checks ===' && \
             docker compose exec -T django python manage.py check && \
             echo '=== Running migrations ===' && \
             docker compose exec -T django python manage.py migrate && \
             echo '✓ Migrations done'"

      - name: Verify deployment (internal stack)
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${REMOTE_DIR}' && docker compose ps && docker compose logs --tail=20 django"

      - name: Verify public HTTPS access
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" \
            -p "${VPS_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "echo '=== Acces public HTTPS (proxy Caddy, hors de ce depot) ===' && \
             curl -fsSI https://pixelprowlers.io && echo '✓ HTTPS public repond' && \
             curl -fsS https://pixelprowlers.io/health/ && echo '✓ /health/ public repond via Caddy'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f "${SSH_KEY_PATH}"

      - name: Success
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "🌐 https://pixelprowlers.io"
