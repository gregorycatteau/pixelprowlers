name: Deploy preproduction

on:
  workflow_dispatch:

concurrency:
  group: pixelprowlers-preprod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      REMOTE_DIR: /opt/pixelprowlers
      SSH_KEY_PATH: ${{ runner.temp }}/pixelprowlers_vps_key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VPS_HOST}"
          test -n "${VPS_USER}"
          test -n "${VPS_PORT}"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > "${SSH_KEY_PATH}"
          chmod 600 "${SSH_KEY_PATH}"
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "whoami && hostname && pwd"

      - name: Prepare remote directory
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "sudo mkdir -p '${REMOTE_DIR}' && sudo chown -R '${VPS_USER}:${VPS_USER}' '${REMOTE_DIR}' && test -d '${REMOTE_DIR}'"

      - name: Upload project with rsync
        shell: bash
        run: |
          set -euo pipefail
          DESTINATION="${VPS_USER}@${VPS_HOST}:${REMOTE_DIR}/"
          if [ "${REMOTE_DIR}" != "/opt/pixelprowlers" ]; then
            echo "Refusing rsync --delete: unexpected REMOTE_DIR=${REMOTE_DIR}" >&2
            exit 1
          fi
          rsync -azvh --delete \
            -e "ssh -i '${SSH_KEY_PATH}' -p '${VPS_PORT}' -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "backend/.env" \
            --exclude "frontend/.env" \
            --exclude "node_modules" \
            --exclude "frontend/node_modules" \
            --exclude ".nuxt" \
            --exclude "frontend/.nuxt" \
            --exclude ".output" \
            --exclude "frontend/.output" \
            --exclude "dist" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude "*.sqlite3" \
            --exclude "*.sql" \
            --exclude "*.dump" \
            --exclude "*.pem" \
            --exclude "*.key" \
            --exclude "*.p12" \
            --exclude ".cache" \
            --exclude ".parcel-cache" \
            --exclude ".screenshots" \
            --exclude ".screenshots/" \
            --exclude "frontend/.screenshots" \
            --exclude "frontend/.screenshots-qc" \
            --exclude "frontend/.tmp" \
            --exclude ".chromium-cache-*" \
            --exclude ".chromium-profile-*" \
            --exclude "Hostinger _ Agents.html" \
            --exclude "Hostinger _ Agents_files" \
            --exclude "89739a58-ce0c-4a33-838c-57d2bc6db367.png" \
            ./ "${DESTINATION}"

      - name: Deploy Docker Compose stack
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail
             cd '${REMOTE_DIR}'
             test -f .env
             chmod 600 .env
             docker compose config >/tmp/pixelprowlers-compose-config.yml
             docker compose up -d --build postgres django nuxt nginx
             docker compose ps
             docker compose exec -T django python manage.py check
             docker compose exec -T django python manage.py migrate
             curl -fsS http://127.0.0.1:8080/api/health/"

      - name: Verify Caddy and public HTTPS
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail
             systemctl status caddy --no-pager
             curl -fsSI https://pixelprowlers.io
             curl -fsSI https://www.pixelprowlers.io || true
             curl -fsS https://pixelprowlers.io/api/health/"
