name: Deploy Preprod

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pixelprowlers-deploy
  cancel-in-progress: false

env:
  VPS_HOST: 46.202.131.25
  VPS_USER: striker
  VPS_PORT: 2222
  REMOTE_DIR: /opt/pixelprowlers
  BACKUP_ROOT: /opt/pixelprowlers-deploy-backups
  SSH_KEY_PATH: /tmp/pixelprowlers_vps_key

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare verified SSH access
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > "${SSH_KEY_PATH}"
          chmod 600 "${SSH_KEY_PATH}"
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"
          test -s "${SSH_KEY_PATH}"
          test -s "${HOME}/.ssh/known_hosts"

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" "echo 'SSH connection successful'"

      - name: Synchronize VPS checkout to workflow SHA
        id: synchronize
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" 'bash -se' -- "${{ github.sha }}" "${REMOTE_DIR}" "${BACKUP_ROOT}" <<'REMOTE'
          set -euo pipefail
          deploy_sha="$1"
          remote_dir="$2"
          backup_root="$3"
          cd "$remote_dir"
          previous_sha="$(git rev-parse HEAD)"
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          deployment_backup="$backup_root/$stamp-$deploy_sha"
          install -d -m 700 "$deployment_backup"
          printf '%s\n' "$previous_sha" > "$deployment_backup/previous-sha.txt"
          chmod 600 "$deployment_backup/previous-sha.txt"
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git diff --binary HEAD > "$deployment_backup/tracked-changes.patch"
            chmod 600 "$deployment_backup/tracked-changes.patch"
            test -s "$deployment_backup/tracked-changes.patch"
            echo "Tracked VPS changes preserved before synchronization"
          fi
          git fetch --no-tags origin master
          git cat-file -e "$deploy_sha^{commit}"
          git merge-base --is-ancestor "$deploy_sha" origin/master
          git restore --source=HEAD --staged --worktree -- .
          git checkout --detach "$deploy_sha"
          test "$(git rev-parse HEAD)" = "$deploy_sha" || {
            echo "ERROR: VPS checkout SHA does not match workflow SHA" >&2
            exit 1
          }
          printf '%s\n' "$deployment_backup" > "$backup_root/current-deployment-backup.txt"
          chmod 600 "$backup_root/current-deployment-backup.txt"
          echo "VPS checkout synchronized to workflow SHA"
          REMOTE

      - name: Verify deployment environment
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "test -s '${REMOTE_DIR}/.env' || { echo 'ERROR: deployment environment file missing'; exit 1; }"

      - name: Build, back up, migrate and start
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" 'bash -se' -- "${REMOTE_DIR}" "${BACKUP_ROOT}" <<'REMOTE'
          set -euo pipefail
          remote_dir="$1"
          backup_root="$2"
          cd "$remote_dir"

          wait_for_service() {
            service="$1"
            attempts="$2"
            shift 2
            ready=0
            for ((i=1; i<=attempts; i++)); do
              if "$@" </dev/null >/dev/null 2>&1; then
                ready=1
                break
              fi
              sleep 2
            done
            if [ "$ready" -ne 1 ]; then
              echo "ERROR: $service did not become ready" >&2
              set +e
              docker inspect --format 'status={{.State.Status}} health={{json .State.Health}} configured={{json .Config.Healthcheck}}' "pixelprowlers-$service" >&2
              docker compose logs --tail=40 "$service" 2>&1 | sed -E '/(password|secret|token|key)/Is/=.*/=[REDACTED]/' >&2
              set -e
              return 1
            fi
            echo "$service ready"
          }

          wait_for_container_health() {
            service="$1"
            attempts="$2"
            ready=0
            for ((i=1; i<=attempts; i++)); do
              health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "pixelprowlers-$service")"
              if [ "$health" = "healthy" ]; then
                ready=1
                break
              fi
              sleep 2
            done
            if [ "$ready" -ne 1 ]; then
              echo "ERROR: $service Docker health did not become healthy" >&2
              set +e
              docker inspect --format 'status={{.State.Status}} health={{json .State.Health}} configured={{json .Config.Healthcheck}}' "pixelprowlers-$service" >&2
              docker compose logs --tail=40 "$service" 2>&1 | sed -E '/(password|secret|token|key)/Is/=.*/=[REDACTED]/' >&2
              set -e
              return 1
            fi
            echo "$service Docker health healthy"
          }

          docker compose config --quiet
          docker compose build
          docker compose up -d postgres
          wait_for_service postgres 30 docker compose exec -T postgres pg_isready

          deployment_backup="$(cat "$backup_root/current-deployment-backup.txt")"
          database_backup="$deployment_backup/postgresql.sql"
          umask 077
          docker compose exec -T postgres sh -c \
            'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
            </dev/null > "$database_backup"
          test -s "$database_backup" || {
            echo "ERROR: PostgreSQL backup is empty" >&2
            exit 1
          }
          chmod 600 "$database_backup"
          echo "PostgreSQL backup completed"

          docker compose run --rm -T django python manage.py check </dev/null
          docker compose run --rm -T django python manage.py migrate </dev/null
          docker compose run --rm -T django python manage.py provision_admin --username striker </dev/null
          docker compose up -d django nuxt

          wait_for_service django 30 docker compose exec -T django \
            curl -fsS http://127.0.0.1:8000/health/
          wait_for_service nuxt 30 docker compose exec -T nuxt \
            node -e "const timer=setTimeout(()=>process.exit(1),2000);fetch('http://127.0.0.1:3000/api/healthz').then(async r=>{const body=await r.json();clearTimeout(timer);process.exit(r.status===200&&body.status==='ok'&&body.service==='nuxt'?0:1)}).catch(()=>process.exit(1))"
          wait_for_container_health nuxt 30
          docker compose ps
          REMOTE

      - name: Verify deployed SHA and public HTTPS
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" 'bash -se' -- "${{ github.sha }}" "${REMOTE_DIR}" "${BACKUP_ROOT}" <<'REMOTE'
          set -euo pipefail
          deploy_sha="$1"
          remote_dir="$2"
          backup_root="$3"
          cd "$remote_dir"
          test "$(git rev-parse HEAD)" = "$deploy_sha" || {
            echo "ERROR: deployed SHA changed during deployment" >&2
            exit 1
          }
          deployment_backup="$(cat "$backup_root/current-deployment-backup.txt")"
          case "$deployment_backup" in
            "$backup_root"/*) ;;
            *) echo "ERROR: invalid deployment backup path" >&2; exit 1 ;;
          esac
          test -s "$deployment_backup/postgresql.sql" || {
            echo "ERROR: PostgreSQL backup missing or empty" >&2
            exit 1
          }
          for service in postgres django nuxt; do
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "pixelprowlers-$service")"
            test "$health" = "healthy" || {
              echo "ERROR: $service is not healthy" >&2
              exit 1
            }
          done
          docker compose exec -T nuxt node -e \
            "const timer=setTimeout(()=>process.exit(1),2000);fetch('http://127.0.0.1:3000/api/healthz').then(async r=>{const body=await r.json();clearTimeout(timer);process.exit(r.status===200&&body.status==='ok'&&body.service==='nuxt'?0:1)}).catch(()=>process.exit(1))" \
            </dev/null
          curl -fsSI https://pixelprowlers.io >/dev/null
          curl -fsS https://pixelprowlers.io/health/ >/dev/null
          echo "HTTPS verification successful"
          REMOTE

      - name: Roll back application on failure
        if: ${{ failure() && steps.synchronize.outcome == 'success' && (steps.deploy.outcome == 'failure' || steps.verify.outcome == 'failure') }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_PATH}" -p "${VPS_PORT}" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" 'bash -se' -- "${REMOTE_DIR}" "${BACKUP_ROOT}" <<'REMOTE'
          set -euo pipefail
          remote_dir="$1"
          backup_root="$2"
          pointer="$backup_root/current-deployment-backup.txt"
          test -s "$pointer" || { echo "ERROR: rollback metadata missing" >&2; exit 1; }
          deployment_backup="$(cat "$pointer")"
          previous_sha="$(cat "$deployment_backup/previous-sha.txt")"
          cd "$remote_dir"
          git cat-file -e "$previous_sha^{commit}"
          git restore --source=HEAD --staged --worktree -- .
          git checkout --detach "$previous_sha"
          docker compose build
          docker compose up -d
          echo "Application rollback completed; database backup retained"
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f "${SSH_KEY_PATH}" "${HOME}/.ssh/known_hosts"

      - name: Success
        if: success()
        run: echo "DEPLOYMENT SUCCESSFUL for ${{ github.sha }}"
