upstream pixelprowlers_nuxt {
    server nuxt:3000;
}

upstream pixelprowlers_django {
    server django:8000;
}

# Ce conteneur nginx ne termine PAS le TLS lui-meme (voir compose.yml pour
# l'hypothese documentee). Si un reverse proxy TLS externe (Caddy/Nginx
# systeme sur le VPS) est place devant ce conteneur, il DOIT transmettre son
# propre X-Forwarded-Proto: https. On le preserve ici plutot que de le
# systematiquement ecraser par $scheme (qui vaudrait toujours "http" au
# niveau de ce conteneur), sinon Django (SECURE_SSL_REDIRECT=True en prod)
# redirige indefiniment en boucle 301 vers https:// sur CHAQUE requete,
# y compris /graphql/, /health/ et /admin/.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    location ^~ /api/ {
        proxy_pass http://pixelprowlers_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /graphql/ {
        proxy_pass http://pixelprowlers_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://pixelprowlers_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /static/ {
        proxy_pass http://pixelprowlers_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /health/ {
        proxy_pass http://pixelprowlers_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location / {
        proxy_pass http://pixelprowlers_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
