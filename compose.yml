services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: pixelprowlers
      POSTGRES_USER: pixelprowlers
      POSTGRES_PASSWORD: pixelprowlers_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelprowlers -d pixelprowlers"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
