services:
  postgres:
    image: postgres:15-alpine
    container_name: pixelprowlers-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelprowlers}
      POSTGRES_USER: ${POSTGRES_USER:-pixelprowlers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelprowlers_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixelprowlers} -d ${POSTGRES_DB:-pixelprowlers}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pixelprowlers-django:latest
    container_name: pixelprowlers-django
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,pixelprowlers.io,www.pixelprowlers.io}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://pixelprowlers.io,https://www.pixelprowlers.io}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://pixelprowlers.io,https://www.pixelprowlers.io}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-False}
      POSTGRES_DB: ${POSTGRES_DB:-pixelprowlers}
      POSTGRES_USER: ${POSTGRES_USER:-pixelprowlers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelprowlers_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DATABASE_URL: ${DATABASE_URL:-postgresql://pixelprowlers:pixelprowlers_dev@postgres:5432/pixelprowlers}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@pixelprowlers.io}
      SMS_DRY_RUN: ${SMS_DRY_RUN:-True}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-True}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
    image: pixelprowlers-nuxt:latest
    container_name: pixelprowlers-nuxt
    depends_on:
      django:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      NUXT_PUBLIC_GRAPHQL_API_URL: ${NUXT_PUBLIC_GRAPHQL_API_URL:-/graphql/}
    expose:
      - "3000"
    restart: unless-stopped

  # HYPOTHESE NON VALIDEE (2026-07-14) : aucun materiel TLS (certs, ACME,
  # Caddyfile) n'existe dans ce depot. Ce service nginx sert donc UNIQUEMENT
  # le port 80 en clair sur le reseau Docker interne du VPS. La terminaison
  # TLS (443) est supposee geree en amont, HORS de ce compose.yml (reverse
  # proxy systeme type Caddy/Nginx sur l'hote, ou load balancer externe) qui
  # doit relayer vers 127.0.0.1:80 sur le VPS. Cette hypothese N'A PAS ETE
  # VERIFIEE sur le VPS reel (aucun acces SSH effectue dans le cadre de cette
  # tache) et DOIT etre confirmee par un humain avant tout deploiement :
  # si aucun proxy systeme n'existe sur le VPS, le site restera inaccessible
  # en HTTPS malgre ce service, et docker-proxy pourrait aussi entrer en
  # conflit avec un service systeme deja lie au port 80.
  nginx:
    image: nginx:1.27-alpine
    container_name: pixelprowlers-nginx
    depends_on:
      django:
        condition: service_healthy
      nuxt:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--header=X-Forwarded-Proto: https", "--spider", "http://127.0.0.1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data: