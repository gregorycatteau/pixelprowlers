services:
  postgres:
    image: postgres:15-alpine
    container_name: pixelprowlers-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelprowlers}
      POSTGRES_USER: ${POSTGRES_USER:-pixelprowlers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelprowlers_dev}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixelprowlers} -d ${POSTGRES_DB:-pixelprowlers}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pixelprowlers-django:latest
    container_name: pixelprowlers-django
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,pixelprowlers.io,www.pixelprowlers.io}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://pixelprowlers.io,https://www.pixelprowlers.io}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://pixelprowlers.io,https://www.pixelprowlers.io}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-False}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB:-pixelprowlers}
      POSTGRES_USER: ${POSTGRES_USER:-pixelprowlers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelprowlers_dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # DATABASE_URL est obligatoire avec DJANGO_DEBUG=False. Ne jamais lui
      # fournir de valeur par défaut codée dans le dépôt.
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-5}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SERVER_EMAIL: ${SERVER_EMAIL}
      CONTACT_NOTIFICATION_RECIPIENT: ${CONTACT_NOTIFICATION_RECIPIENT}
      CONTACT_HMAC_SECRET: ${CONTACT_HMAC_SECRET}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
      DJANGO_MAX_REQUEST_BODY_BYTES: ${DJANGO_MAX_REQUEST_BODY_BYTES:-1048576}
      SMS_DRY_RUN: ${SMS_DRY_RUN:-True}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-True}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
    image: pixelprowlers-nuxt:latest
    container_name: pixelprowlers-nuxt
    depends_on:
      django:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      NUXT_PUBLIC_GRAPHQL_API_URL: ${NUXT_PUBLIC_GRAPHQL_API_URL:-/graphql/}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

networks:
  default:
    name: pixelprowlers_default

volumes:
  postgres_data:
