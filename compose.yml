services:
  postgres:
    image: postgres:15-alpine
    container_name: pixelprowlers-postgres
    environment:
      POSTGRES_DB: pixelprowlers
      POSTGRES_USER: pixelprowlers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:-pixelprowlers_dev}}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelprowlers -d pixelprowlers"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
    image: pixelprowlers-django
    container_name: pixelprowlers-django
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-${SECRET_KEY:-pixelprowlers-dev-insecure-compose}}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,pixelprowlers-django}}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:8001}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      POSTGRES_DB: ${POSTGRES_DB:-pixelprowlers}
      POSTGRES_USER: ${POSTGRES_USER:-pixelprowlers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:-pixelprowlers_dev}}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      SMS_DRY_RUN: ${SMS_DRY_RUN:-true}
    ports:
      - "8001:8000"

  nuxt:
    image: node:24-alpine
    container_name: pixelprowlers-nuxt
    working_dir: /app
    depends_on:
      - django
    environment:
      GRAPHQL_API_URL: http://pixelprowlers-django:8000/graphql/
      NUXT_PUBLIC_GRAPHQL_API_URL: http://localhost:8001/graphql/
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
